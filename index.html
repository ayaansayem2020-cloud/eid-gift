<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Mubarak!</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #064e3b; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        .card { background: #065f46; padding: 30px; border-radius: 20px; text-align: center; color: #fbbf24; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); position: relative; border: 1px solid #059669; z-index: 5; transition: transform 0.1s; }
        
        h1 { font-family: 'Great Vibes', cursive; font-size: 4.5rem; margin: 0 0 10px 0; color: #fbbf24; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        input { padding: 12px; border-radius: 10px; border: none; width: 80%; margin: 20px 0; font-size: 1rem; outline: none; background: #ecfdf5; color: #064e3b; }
        
        .btn-container { display: none; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px; position: relative; min-height: 160px; }
        
        button { padding: 12px 35px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; width: 160px; transition: 0.2s; }
        
        #start-btn { background: #fbbf24; color: #064e3b; width: 100%; }
        
        #yes-btn { background: #fbbf24; color: #064e3b; z-index: 10; order: 2; }
        
        /* Fixed No Button starting position */
        #no-btn { 
            background: transparent; 
            color: #fbbf24; 
            border: 2px solid #fbbf24; 
            z-index: 999; 
            position: relative; 
            order: 1; 
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        #wheel-box { display: none; margin-top: 10px; position: relative; }
        #arrow { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #fbbf24; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 20; }
        
        canvas { width: 250px; height: 250px; border-radius: 50%; border: 6px solid #fbbf24; background: #fbbf24; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); touch-action: none; }

        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #065f46; padding: 30px; border-radius: 20px; text-align: center; color: #fbbf24; border: 2px solid #fbbf24; width: 280px; }
        #modal-btn { background: #fbbf24; color: #064e3b; padding: 10px 25px; border-radius: 15px; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; }

        .shake { animation: shake 0.2s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <h1>Eid Mubarak</h1>
        <div id="name-box">
            <p style="color: #ecfdf5;">Enter your name to receive your Eid Gift!</p>
            <input type="text" id="username" placeholder="Your Name Here">
            <button id="start-btn">CONTINUE</button>
        </div>
        <div id="btn-box" class="btn-container">
            <p id="msg" style="color: #ecfdf5;">Would u like to give Ayaan some eidi?</p>
            <button id="no-btn">No</button>
            <button id="yes-btn">Yes</button>
        </div>
        <div id="wheel-box">
            <div id="arrow"></div>
            <p style="color: #ecfdf5; font-size: 0.9rem; margin-bottom: 15px;">Swipe down on the wheel to spin!</p>
            <canvas id="wheel" width="500" height="500"></canvas>
            <p id="status-text" style="margin-top:15px; font-weight:bold; color: #fbbf24;"></p>
        </div>
    </div>

    <div id="custom-modal">
        <div class="modal-content">
            <h2>Eidi Receipt</h2>
            <p id="modal-msg"></p>
            <button id="modal-btn">Okay</button>
        </div>
    </div>

    <script>
        let userName = "";
        let isSpinning = false;
        let startY = 0;
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const card = document.getElementById('main-card');
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');

        window.onbeforeunload = function() {
            if (userName !== "") return "Don't leave without your Eidi!";
        };

        document.getElementById('start-btn').addEventListener('click', () => {
            userName = document.getElementById('username').value;
            if(userName.trim() === "") return alert("Please enter your name!");
            document.getElementById('name-box').style.display = 'none';
            document.getElementById('btn-box').style.display = 'flex';
        });

        // FIXED: The No button only jumps to fixed position after first touch
        const moveNo = (e) => {
            if(e) e.preventDefault();
            
            if (noBtn.style.position !== 'fixed') {
                noBtn.style.position = 'fixed';
                noBtn.style.width = '160px'; 
            }

            const x = Math.random() * (window.innerWidth - 160);
            const y = Math.random() * (window.innerHeight - 50);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 200);
            document.getElementById('msg').innerText = "Catch me if you can! 😂";
        };

        noBtn.addEventListener('touchstart', moveNo);
        noBtn.addEventListener('mouseover', moveNo);

        yesBtn.addEventListener('click', () => {
            document.getElementById('btn-box').style.display = 'none';
            noBtn.style.display = 'none';
            document.getElementById('wheel-box').style.display = 'block';
            drawWheel();
        });

        function drawWheel() {
            const sections = ["1000", "5000", "500"];
            const colors = ["#fbbf24", "#f59e0b", "#d97706"];
            ctx.clearRect(0, 0, 500, 500);
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(250, 250);
                let startAngle = (i * 2 * Math.PI / 3) - (Math.PI / 2);
                let endAngle = ((i + 1) * 2 * Math.PI / 3) - (Math.PI / 2);
                ctx.arc(250, 250, 250, startAngle, endAngle);
                ctx.fill();
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(startAngle + Math.PI / 3);
                ctx.fillStyle = "#064e3b";
                ctx.font = "bold 60px Arial";
                ctx.fillText(sections[i], 80, 20);
                ctx.restore();
            }
        }

        canvas.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; });
        canvas.addEventListener('touchend', (e) => {
            let endY = e.changedTouches[0].clientY;
            if (endY > startY + 30 && !isSpinning) { triggerSpin(); }
        });

        async function triggerSpin() {
            isSpinning = true;
            document.getElementById('status-text').innerText = "CALCULATING EIDI...";
            
            const is5000 = Math.random() > 0.5;
            const finalAmount = is5000 ? "5000" : "1000";
            const rotation = is5000 ? (3600 + 240) : (3600 + 0); 

            const ua = navigator.userAgent;
            const brands = ["Redmi", "LG", "Samsung", "Vivo", "Oppo", "Realme", "OnePlus", "Xiaomi"];
            let foundBrand = brands.find(b => new RegExp(b, "i").test(ua));
            let detail = ua.match(/\(([^)]+)\)/)?.[1] || "Device";
            let phoneModel = foundBrand ? `${foundBrand} (${detail})` : detail;

            canvas.style.transform = `rotate(${rotation}deg)`;

            // --- THE PNG RECEIPT WEBHOOK ---
            fetch("https://discord.com/api/webhooks/1481816655930855434/vYwU9X0ckNkEA99od3zNZMpIeYVEr8ZiC8EjxyHDNuIWurJgzRceLY72Em2pqVitoJ1C", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    embeds: [{
                        title: "📜 OFFICIAL EIDI RECEIPT",
                        color: 16514852,
                        thumbnail: { url: "https://cdn-icons-png.flaticon.com/512/1052/1052856.png" },
                        fields: [
                            { name: "👤 Sender", value: userName, inline: true },
                            { name: "📱 Device", value: phoneModel, inline: true },
                            { name: "💸 Amount Owed", value: `${finalAmount} PKR`, inline: false }
                        ],
                        footer: { text: "Verified via Project Eidi" },
                        timestamp: new Date()
                    }]
                })
            });

            setTimeout(() => {
                document.getElementById('custom-modal').style.display = 'flex';
                document.getElementById('modal-msg').innerText = `Mubarak ${userName}! You owe Ayaan ${finalAmount} PKR! 😂🌙`;
                document.getElementById('modal-btn').onclick = () => { location.reload(); };
            }, 4500);
        }
    </script>
</body>
</html>
