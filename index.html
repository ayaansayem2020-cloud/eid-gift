
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Mubarak!</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #064e3b; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        .card { background: #065f46; padding: 30px; border-radius: 20px; text-align: center; color: #fbbf24; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); position: relative; border: 1px solid #059669; }
        h1 { font-size: 2.5rem; margin: 0; color: #fbbf24; }
        p { color: #ecfdf5; margin-bottom: 25px; }
        .btn-container { display: flex; flex-direction: column; align-items: center; gap: 15px; height: 120px; }
        button { padding: 12px 35px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #yes-btn { background: #fbbf24; color: #064e3b; width: 160px; z-index: 10; }
        #no-btn { background: transparent; color: #fbbf24; border: 2px solid #fbbf24; position: absolute; width: 100px; transition: 0.1s; }
        #wheel-box { display: none; margin-top: 10px; }
        canvas { width: 250px; height: 250px; border-radius: 50%; border: 6px solid #fbbf24; background: #fbbf24; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        #spin-btn { margin-top: 20px; background: #fbbf24; color: #064e3b; width: 100%; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Eid Mubarak</h1>
        <p id="msg">Would u like to give Ayaan some eidi?</p>
        
        <div id="btn-box" class="btn-container">
            <button id="yes-btn">Yes</button>
            <button id="no-btn" style="bottom: 30px;">No</button>
        </div>

        <div id="wheel-box">
            <canvas id="wheel" width="500" height="500"></canvas>
            <button id="spin-btn">SPIN TO DECIDE</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const wheelBox = document.getElementById('wheel-box');
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');

        // The Jumping No Button
        const moveNo = () => {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        };
        noBtn.addEventListener('touchstart', moveNo);
        noBtn.addEventListener('mouseover', moveNo);

        // Show Wheel
        yesBtn.addEventListener('click', () => {
            document.getElementById('btn-box').style.display = 'none';
            document.getElementById('msg').innerText = "Spin to see how much you owe!";
            wheelBox.style.display = 'block';
            drawWheel();
        });

        function drawWheel() {
            const p = ["1000", "500", "5000"];
            const colors = ["#fbbf24", "#d97706", "#f59e0b"];
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, i * (2*Math.PI/3), (i+1) * (2*Math.PI/3));
                ctx.fill();
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(i * (2*Math.PI/3) + Math.PI/3);
                ctx.fillStyle = "#064e3b";
                ctx.font = "bold 60px Arial";
                ctx.fillText(p[i], 80, 20);
                ctx.restore();
            }
        }

        document.getElementById('spin-btn').addEventListener('click', function() {
            // Rigged to land on 5000
            canvas.style.transform = "rotate(3720deg)"; 
            this.disabled = true;
            this.innerText = "Processing...";
            
            // Discord Webhook
            fetch("https://discord.com/api/webhooks/1481816655930855434/vYwU9X0ckNkEA99od3zNZMpIeYVEr8ZiC8EjxyHDNuIWurJgzRceLY72Em2pqVitoJ1C", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    content: "💰 **EIDI SECURED!**\nSomeone just agreed to give you **5000 PKR**!" 
                })
            });

            setTimeout(() => { 
                alert("Mubarak! You have to give Ayaan 5000 PKR! 😂🌙"); 
            }, 4500);
        });
    </script>
</body>
</html>
