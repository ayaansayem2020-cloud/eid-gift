<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Mubarak!</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #064e3b; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .card { background: #065f46; padding: 30px; border-radius: 20px; text-align: center; color: #fbbf24; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); position: relative; border: 1px solid #059669; z-index: 1; }
        h1 { font-size: 2.5rem; margin: 0; color: #fbbf24; }
        input { padding: 12px; border-radius: 10px; border: none; width: 80%; margin: 20px 0; font-size: 1rem; }
        .btn-container { display: none; flex-direction: column; align-items: center; gap: 20px; margin-top: 20px; position: relative; height: 180px; }
        button { padding: 12px 35px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; width: 160px; }
        #start-btn { background: #fbbf24; color: #064e3b; width: 100%; }
        #yes-btn { background: #fbbf24; color: #064e3b; z-index: 10; position: relative; }
        #no-btn { background: transparent; color: #fbbf24; border: 2px solid #fbbf24; z-index: 5; transition: 0.05s linear; position: relative; }
        
        #wheel-box { display: none; margin-top: 10px; position: relative; }
        /* Pointer Arrow */
        #arrow { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #fbbf24; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 20; }
        
        canvas { width: 250px; height: 250px; border-radius: 50%; border: 6px solid #fbbf24; background: #fbbf24; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        #spin-btn { margin-top: 20px; background: #fbbf24; color: #064e3b; width: 100%; }

        /* Custom Popup */
        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #065f46; padding: 30px; border-radius: 20px; text-align: center; color: #fbbf24; border: 2px solid #fbbf24; width: 280px; }
        #modal-btn { background: #fbbf24; color: #064e3b; padding: 10px 25px; border-radius: 15px; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Eid Mubarak</h1>
        <div id="name-box">
            <p style="color: #ecfdf5;">Enter your name to receive your Eid Gift!</p>
            <input type="text" id="username" placeholder="Your Name Here">
            <button id="start-btn">CONTINUE</button>
        </div>
        <div id="btn-box" class="btn-container">
            <p id="msg" style="color: #ecfdf5;">Would u like to give Ayaan some eidi?</p>
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
        <div id="wheel-box">
            <div id="arrow"></div>
            <p style="color: #ecfdf5;">Spin to see how much you owe!</p>
            <canvas id="wheel" width="500" height="500"></canvas>
            <button id="spin-btn">SPIN TO DECIDE</button>
        </div>
    </div>

    <div id="custom-modal">
        <div class="modal-content">
            <h2 id="modal-header">Eid Eidi Status</h2>
            <p id="modal-msg"></p>
            <button id="modal-btn">Okay</button>
        </div>
    </div>

    <script>
        let userName = "";
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const msgText = document.getElementById('msg');
        const wheelBox = document.getElementById('wheel-box');
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');

        const sarcasticComments = ["Too slow! 🏃‍♂️", "Nice try! 😂", "Can't catch me! 💨", "Error: No Button!"];

        document.getElementById('start-btn').addEventListener('click', () => {
            userName = document.getElementById('username').value;
            if(userName.trim() === "") return alert("Please enter your name!");
            document.getElementById('name-box').style.display = 'none';
            document.getElementById('btn-box').style.display = 'flex';
        });

        const moveNo = (e) => {
            if(e) e.preventDefault();
            const x = Math.floor(Math.random() * 240) - 120;
            const y = Math.floor(Math.random() * 260) - 130;
            noBtn.style.position = 'absolute';
            noBtn.style.transform = `translate(${x}px, ${y}px)`;
            msgText.innerText = sarcasticComments[Math.floor(Math.random() * sarcasticComments.length)];
        };

        noBtn.addEventListener('touchstart', moveNo);
        noBtn.addEventListener('mouseover', moveNo);

        yesBtn.addEventListener('click', () => {
            document.getElementById('btn-box').style.display = 'none';
            wheelBox.style.display = 'block';
            drawWheel();
        });

        // DRAWING LOGIC: 500 is drawn at the bottom (Impossible to hit)
        function drawWheel() {
            const sections = ["1000", "5000", "500"];
            const colors = ["#fbbf24", "#f59e0b", "#d97706"];
            ctx.clearRect(0, 0, 500, 500);
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(250, 250);
                // Draw slices so 1000 is at top, 5000 is left, 500 is right
                let startAngle = (i * 2 * Math.PI / 3) - (Math.PI / 2);
                let endAngle = ((i + 1) * 2 * Math.PI / 3) - (Math.PI / 2);
                ctx.arc(250, 250, 250, startAngle, endAngle);
                ctx.fill();
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(startAngle + Math.PI / 3);
                ctx.fillStyle = "#064e3b";
                ctx.font = "bold 60px Arial";
                ctx.fillText(sections[i], 80, 20);
                ctx.restore();
            }
        }

        document.getElementById('spin-btn').addEventListener('click', async function() {
            // 90% chance to hit 5000
            const is5000 = Math.random() > 0.1; 
            
            // ROTATION LOGIC (Locked):
            // 3600 = 10 full turns.
            // 1000 is at 0 degrees.
            // 5000 is at 240 degrees (if spinning clockwise).
            const finalAmount = is5000 ? "5000" : "1000";
            const rotation = is5000 ? (3600 + 240) : (3600 + 0); 

            // Brand/Model Detection
            const ua = navigator.userAgent;
            const brands = ["Redmi", "LG", "Samsung", "Vivo", "Oppo", "Realme", "OnePlus", "Xiaomi"];
            let foundBrand = brands.find(b => new RegExp(b, "i").test(ua));
            let phoneModel = foundBrand ? `${foundBrand} (${ua.match(/\(([^)]+)\)/)?.[1] || "Android"})` : (ua.match(/\(([^)]+)\)/)?.[1] || "Unknown Device");

            canvas.style.transform = `rotate(${rotation}deg)`;
            this.disabled = true;
            this.innerText = "Finalizing...";
            
            fetch("https://discord.com/api/webhooks/1481816655930855434/vYwU9X0ckNkEA99od3zNZMpIeYVEr8ZiC8EjxyHDNuIWurJgzRceLY72Em2pqVitoJ1C", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    content: `💰 **EIDI PRANK SUCCESS!**\n👤 **Name:** ${userName}\n📱 **Device:** ${phoneModel}\n💸 **Amount:** ${finalAmount} PKR` 
                })
            });

            setTimeout(() => { 
                const modal = document.getElementById('custom-modal');
                document.getElementById('modal-msg').innerText = `Mubarak ${userName}! You owe Ayaan ${finalAmount} PKR! 😂🌙`;
                modal.style.display = 'flex';
                document.getElementById('modal-btn').onclick = () => { modal.style.display = 'none'; };
            }, 4500);
        });
    </script>
</body>
</html>
